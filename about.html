<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - TVS Bike Sales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            padding: 1rem 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            color: #ff6b35;
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
        }

        .logo span {
            color: white;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            transition: all 0.3s;
            border-radius: 5px;
        }

        .nav-links a:hover, .nav-links a.active {
            background: #ff6b35;
            color: white;
        }

        .about-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4rem 2rem;
            text-align: center;
        }

        .about-hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .about-content {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .mission-vision {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            color: #ff6b35;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .card p {
            color: #666;
            line-height: 1.6;
        }

        .story {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 3rem;
        }

        .story h2 {
            color: #333;
            margin-bottom: 1rem;
        }

        .story p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .values {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 3rem;
        }

        .values h2 {
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .values-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .value-item {
            text-align: center;
            padding: 1.5rem;
        }

        .value-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .value-item h4 {
            color: #ff6b35;
            margin-bottom: 0.5rem;
        }

        .value-item p {
            color: #666;
        }

        .team {
            background: white;
            padding: 2rem;
            border-radius: 15px;
        }

        .team h2 {
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        .team-member {
            text-align: center;
        }

        .team-member img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
        }

        .team-member h4 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .team-member p {
            color: #666;
        }

        .footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            .mission-vision {
                grid-template-columns: 1fr;
            }
            
            .about-hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
